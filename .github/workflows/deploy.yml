name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master, "claude/setup-gha-wgpu-KBXiB"]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

# Only one deployment at a time; cancel in-flight runs on new push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install trunk
        # Download a pre-built binary to avoid a full cargo install compile.
        run: |
          TRUNK_VERSION="0.21.1"
          curl -fsSL \
            "https://github.com/trunk-rs/trunk/releases/download/v${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin trunk

      - name: Build (release)
        run: trunk build --release

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
